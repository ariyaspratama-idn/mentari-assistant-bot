name: Test Mentari API

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Debug Script
        env:
          MENTARI_JWT: ${{ secrets.MENTARI_JWT }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          SL_SESSION: ${{ secrets.SL_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node debug-ping.js
